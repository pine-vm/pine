name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:

      - name: Avoid git mutating files on checkout
        run: |
          git config --global core.autocrlf false

      - name: Install ripgrep
        run: |
          sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Check ripgrep installation
        run: rg --version

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Check installed dotnet
        run: dotnet --info

      - name: Install dotnet-script tool
        run: dotnet tool install -g dotnet-script

      - name: Check dotnet-script installation
        run: dotnet script --version

      - name: Install dotnet-trace tool
        run: dotnet  tool  install --global dotnet-trace

      - name: Check dotnet-trace installation
        run: dotnet trace --version

      - name: Install Pine to $RUNNER_TEMP and expose it
        run: |
          set -euo pipefail
          curl -L https://github.com/pine-vm/pine/releases/download/v0.4.31/pine-bin-v0.4.31-linux-x64.zip \
              -o "$RUNNER_TEMP/pine.zip"
          unzip -q "$RUNNER_TEMP/pine.zip" -d "$RUNNER_TEMP/pine"
          echo "$RUNNER_TEMP/pine" >> "$GITHUB_PATH"

      - name: Check Pine installation
        run: |
          set -euo pipefail
          pine --version

      - name: Install elm-test-rs
        run: |
          set -euo pipefail
          # Download the tarball
          curl -L https://github.com/mpizenberg/elm-test-rs/releases/download/v3.0.1/elm-test-rs_linux.tar.gz \
              -o "$RUNNER_TEMP/elm-test-rs.tar.gz"

          # Create a directory for extraction
          mkdir -p "$RUNNER_TEMP/elm-test-rs"

          # Extract the binary
          tar -xzf "$RUNNER_TEMP/elm-test-rs.tar.gz" -C "$RUNNER_TEMP/elm-test-rs"

          # Add the directory to the system PATH
          echo "$RUNNER_TEMP/elm-test-rs" >> "$GITHUB_PATH"

      - name: Check elm-test-rs installation
        run: elm-test-rs --version

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prebuild
        working-directory: ./implement/
        run: |
          dotnet  run  --project ./prebuild/prebuild.csproj  --configuration Release

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          claude_args: |
            --model claude-opus-4-7
            --max-turns 30
            --system-prompt "Read all of .github/copilot-instructions.md and follow those instructions."

          # Optional: Customize the trigger phrase (default: @claude)
          # trigger_phrase: "/claude"

          # Optional: Trigger when specific user is assigned to an issue
          # assignee_trigger: "claude-bot"

          # Optional: Configure Claude's behavior with CLI arguments
          # claude_args: |
          #   --model claude-opus-4-1-20250805
          #   --max-turns 10
          #   --allowedTools "Bash(npm install),Bash(npm run build),Bash(npm run test:*),Bash(npm run lint:*)"
          #   --system-prompt "Follow our coding standards. Ensure all new code has tests. Use TypeScript for new files."

          # Optional: Advanced settings configuration
          # settings: |
          #   {
          #     "env": {
          #       "NODE_ENV": "test"
          #     }
          #   }
